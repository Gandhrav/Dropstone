<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 120" role="img" aria-label="Dropstone logo">
  <defs>
    <linearGradient id="ds-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- icon: a stone settling, ripples become graph edges -->
  <g>
    <!-- connection edges -->
    <line x1="60" y1="66" x2="16" y2="90" stroke="url(#ds-grad)" stroke-width="1.6" opacity="0.55"/>
    <line x1="60" y1="66" x2="104" y2="90" stroke="url(#ds-grad)" stroke-width="1.6" opacity="0.55"/>
    <line x1="104" y1="90" x2="82" y2="106" stroke="url(#ds-grad)" stroke-width="1.6" opacity="0.55"/>

    <!-- ripples -->
    <ellipse cx="60" cy="92" rx="30" ry="9" fill="none" stroke="url(#ds-grad)" stroke-width="3"/>
    <ellipse cx="60" cy="92" rx="47" ry="15" fill="none" stroke="url(#ds-grad)" stroke-width="2" opacity="0.4"/>

    <!-- fall trail -->
    <line x1="55" y1="6" x2="52" y2="16" stroke="url(#ds-grad)" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
    <line x1="65" y1="10" x2="61" y2="19" stroke="url(#ds-grad)" stroke-width="2" opacity="0.25" stroke-linecap="round"/>

    <!-- the stone: faceted pebble, not a liquid drop -->
    <path d="M60 18 L75 27 L81 46 L71 62 L49 62 L39 46 L45 27 Z"
          fill="url(#ds-grad)" stroke="url(#ds-grad)" stroke-width="1" stroke-linejoin="round"/>
    <!-- facet lines for a cut-stone look -->
    <path d="M60 18 L60 40 M75 27 L60 40 M81 46 L60 40 M71 62 L60 40 M49 62 L60 40 M39 46 L60 40 M45 27 L60 40"
          fill="none" stroke="#ffffff" stroke-width="1" opacity="0.25"/>

    <!-- linked nodes on the ripples -->
    <circle cx="16" cy="90" r="5" fill="url(#ds-grad)"/>
    <circle cx="104" cy="90" r="5" fill="url(#ds-grad)"/>
    <circle cx="82" cy="106" r="4" fill="url(#ds-grad)" opacity="0.8"/>
  </g>

  <!-- wordmark -->
  <text x="138" y="72" font-family="'Segoe UI', -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="46" font-weight="700" letter-spacing="0.5" fill="#0f172a">Dropstone</text>
  <text x="141" y="100" font-family="'Segoe UI', -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="15" font-style="italic" fill="#64748b">drop anything — it settles where it belongs</text>
</svg>
